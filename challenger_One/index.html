<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Decoder One</title>
    <link rel="stylesheet" href="normalizar.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    </header>
    <main>
        <div class="logo">
            <img src="./Vector.png">
        </div>
        <input type="text" name="texto" id="texto" placeholder="Digite seu texto">
        <div class="retangulo">
            <img src="./High quality products 1 1.svg">
        </div>
        <div class="quadrado-cripto">
            <label for="cripto">Nenhuma mensagem encontrada</label>
            <textarea id="cripto" name="text" rows="100" cols="50">
Digite um texto que você deseja criptografar ou descriptografar.
            </textarea>
        </div>
        <div class="info">
            <p class="exclamação">&#33;</p>
            <p class="informacao">Apenas letras minúsculas e sem acento.</p>
        </div>
        <div class="botao-cripto">
            <div class="botao">
                <input type="button" onclick="cript()" id="cript" name="acao" value="Criptografar">
            </div>
            <div class="botao-2">
                <input type="button" onclick="descript()" id="descript" name="reacao" value="Descriptografar">
            </div>
        </div>
        <script>
            function cript(){
                var valor = document.getElementById("texto").value;
                alert("Você digitou: " + valor);

        }
        </script>
    </main>
   
</body>
</html>
